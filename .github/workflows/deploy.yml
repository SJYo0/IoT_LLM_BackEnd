name: Auto Deploy Backend to KT Cloud

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 백엔드 서비스 타겟 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/iot-platform/llm-server
            git pull origin main
            
            cd ~/iot-platform
            
            sudo docker-compose rm -fs llm-server
            
            sudo docker-compose up -d --build llm-server